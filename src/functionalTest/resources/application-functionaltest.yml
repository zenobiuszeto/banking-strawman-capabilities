spring:
  # ── In-memory H2 as PostgreSQL substitute ──────────────────────────────────
  datasource:
    url: "jdbc:h2:mem:functional_testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  # ── Disable Flyway (DDL managed by Hibernate) ─────────────────────────────
  flyway:
    enabled: false

  # ── Disable Redis, MongoDB, Kafka auto-configuration ──────────────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

  # ── Disable Spring cache (no Redis) ──────────────────────────────────────
  cache:
    type: none

  # ── Security: disable OAuth2 JWT validation ──────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:

  lifecycle:
    timeout-per-shutdown-phase: 1s

# ── Disable Temporal ──────────────────────────────────────────────────────────
temporal:
  enabled: false

# ── Disable Batch scheduler ───────────────────────────────────────────────────
batch:
  scheduler:
    enabled: false

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false
    mongo:
      enabled: false

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.banking: DEBUG
    org.springframework.web: WARN
