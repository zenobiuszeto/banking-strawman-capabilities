apiVersion: v1
kind: Service
metadata:
  name: banking-platform-service
  namespace: banking
  labels:
    app: banking-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  selector:
    app: banking-platform
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
---
# Headless service for pod-to-pod discovery
apiVersion: v1
kind: Service
metadata:
  name: banking-platform-headless
  namespace: banking
spec:
  clusterIP: None
  selector:
    app: banking-platform
  ports:
    - name: http
      port: 8080
      targetPort: 8080
